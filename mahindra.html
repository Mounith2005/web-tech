<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Listings</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <style>
        .card-body {
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-dark">
        <a class="navbar-brand" href="#">
            <img src="https://static-asset.tractorjunction.com/tj/TJ_LOGO_en.svg" width="80" height="57" alt="Logo">
        </a>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ml-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="index.html">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">About</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Services</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#">Contact</a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-5">
        <div class="row">
            <!-- First Item -->
            <div class="col-md-4 mb-4 text-left mx-auto" itemscope itemtype="https://schema.org/ListItem">
                <div class="card shadow-sm">
                    <img src="https://images.tractorgyan.com/uploads/106551/64f577d030d13-swaraj-855-fe.webp" class="card-img-top img-fluid" alt="Swaraj 855 FE">
                    <div class="card-body">
                        <h5 class="card-title"><strong><img src="https://tractorgyan.com/uploads/smm/icons/iconmodel-01.png" width="27" alt="tractor brand"> Swaraj 855 FE</strong></h5>
                        <div class="product-specs">
                            <p><img src="https://tractorgyan.com/uploads/smm/icons/iconhorsepower-01_small.webp" width="18" alt="tractor hp"> HP: 50</p>
                            <p><img src="https://tractorgyan.com/uploads/smm/icons/iconenginecylinders-01_small.webp" width="18" alt="tractor cylinder"> Cylinder: 3</p>
                            <p><img src="https://tractorgyan.com/uploads/smm/icons/iconligtingcapacity-01_small.webp" width="18" alt="tractor lifting capacity"> Lifting Capacity: 2000 kg</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Second Item -->
            <div class="col-md-4 mb-4 text-left mx-auto" itemscope itemtype="https://schema.org/ListItem">
                <div class="card shadow-sm">
                    <img src="https://images.tractorgyan.com/uploads/106551/64f577d030d13-swaraj-855-fe.webp" class="card-img-top img-fluid" alt="Swaraj 855 FE">
                    <div class="card-body">
                        <h5 class="card-title"><strong><img src="https://tractorgyan.com/uploads/smm/icons/iconmodel-01.png" width="27" alt="tractor brand"> Swaraj 855 FE</strong></h5>
                        <div class="product-specs">
                            <p><img src="https://tractorgyan.com/uploads/smm/icons/iconhorsepower-01_small.webp" width="18" alt="tractor hp"> HP: 50</p>
                            <p><img src="https://tractorgyan.com/uploads/smm/icons/iconenginecylinders-01_small.webp" width="18" alt="tractor cylinder"> Cylinder: 3</p>
                            <p><img src="https://tractorgyan.com/uploads/smm/icons/iconligtingcapacity-01_small.webp" width="18" alt="tractor lifting capacity"> Lifting Capacity: 2000 kg</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS and dependencies -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
